name: Build Release ISO

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift
          sudo apt-get clean
          df -h /

      - name: Build builder image (modern live-build on Debian)
        run: docker build -t semicode-builder docker/

      - name: Build ISO
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}":/build \
            semicode-builder ./scripts/build.sh

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SemiCode OS v${{ steps.version.outputs.version }}"
          draft: true
          generate_release_notes: true
          files: builds/amd64/*.iso
