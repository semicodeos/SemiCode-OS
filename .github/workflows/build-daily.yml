name: Weekly Build

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 4am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift
          sudo apt-get clean
          df -h /

      - name: Build builder image (modern live-build on Debian)
        run: docker build -t semicode-builder docker/

      - name: Build ISO
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}":/build \
            semicode-builder ./scripts/build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: semicode-os-weekly-${{ github.sha }}
          path: builds/amd64/*.iso
          retention-days: 14
